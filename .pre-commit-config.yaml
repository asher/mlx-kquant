# Run `pre-commit install` once to enable. Mirrors the CI lint job.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.5
    hooks:
      - id: clang-format
        # All first-party C++/Metal sources. `types_or: [file]` overrides the
        # hook's default c/c++ filter so the .metal kernels (not type-detected
        # as C++) are covered too; the inline `// clang-format off` regions in
        # them protect the macro tables.
        files: '^(bindings\.cpp|src/.*\.(cpp|h)|metal/([^/]*\.metal|mlx/.*\.h))$'
        types_or: [file]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: check-codecs
        name: codec doc-lint (check-codecs.py)
        # Mirrors the CI doc-lint; runs fine without the built extension
        # (the kq.codecs() leg is skipped with a note).
        entry: python3 scripts/check-codecs.py --check
        language: system
        pass_filenames: false
        files: '^(mlx_kquant/codec_geometry\.py|README\.md|scripts/check-codecs\.py)$'
