name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  logic:
    # Apple Silicon runner: the extension is a Metal C++ module, so it only
    # builds on macOS arm64. These tests are pure logic + tiny mx ops and run on
    # the CPU device (KQUANT_FORCE_CPU) — no kernel dispatch, no models, no GPU.
    # The integration / slow long-context tests are env-gated (they need real
    # GGUFs and a llama.cpp binary) and are not run here.
    name: logic (no models)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build extension + install with the gguf extra
        run: |
          python -m pip install --upgrade pip
          pip install "mlx==0.31.2" "nanobind==2.12.0" "cmake>=3.27"
          pip install -e '.[gguf]'

      - name: Logic tests
        env:
          KQUANT_FORCE_CPU: "1"
        run: |
          pytest -q \
            tests/test_remap.py \
            tests/test_arch_gate.py \
            tests/test_preflight.py \
            tests/test_transforms.py \
            tests/test_config_synth.py \
            tests/test_tokenizer.py

      - name: Arch-coverage doc is current
        run: python scripts/check-coverage.py --check

      - name: Arch-coverage is self-consistent
        run: python scripts/check-coverage.py --strict
