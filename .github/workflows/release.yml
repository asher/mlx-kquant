name: release

# Tag-triggered build + publish. Push a vX.Y.Z tag (matching
# mlx_kquant/_version.py) to build macOS arm64 wheels and publish to PyPI via
# trusted publishing (no API token stored).
#
# Prerequisites (one-time, before the first real release):
#   * a PyPI project + a Trusted Publisher entry for this repo/workflow;
#   * a GitHub Environment named "pypi" (optionally with required reviewers);
#   * a wheel validated on a clean machine (see [tool.cibuildwheel] note).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-wheels:
    name: build wheels (macos arm64)
    runs-on: macos-26
    env:
      MACOSX_DEPLOYMENT_TARGET: "26.2"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python3 -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('mlx_kquant/_version.py').read()).group(1))")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match mlx_kquant/_version.py ($pkg_version)"
            exit 1
          fi
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
      - uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build-sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python3 -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('mlx_kquant/_version.py').read()).group(1))")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match mlx_kquant/_version.py ($pkg_version)"
            exit 1
          fi
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true   # pull both the wheels and sdist artifacts into dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
